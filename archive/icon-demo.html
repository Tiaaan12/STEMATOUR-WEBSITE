<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://kit.fontawesome.com/473c509a88.js" crossorigin="anonymous"></script>
    <style>
       *{
        box-sizing: border-box;
       }
        #icons {
            text-align: right;
            margin-right: 140px;
            
            
            
            
        }
        #icons i{
            
            font-size: 30px;
        }
        .fa-brand.fa-facebook.fa-5x {
            color: hsl(236, 73%, 36%);
        }
        .fa-brand.fa-facebook.fa-5x:hover {
            color: hsl(236, 73%, 46%);
        }
        .fa-brands.fa-twitter.fa-5x {
            color: hsl(188, 100%, 50%);
        } 
        .fa-brands.fa-twitter.fa-5x:hover {
            color: hsl(188, 100%, 60%);
        } 

        .fa-brands.fa-instagram.fa-5x {
            color: hsl(39, 100%, 50%);
        }
        .fa-brands.fa-instagram.fa-5x:hover{
            color: hsl(39, 100%, 60%);
        }
        .fa-brands.fa-youtube.fa-5x {
            color: hsl(0, 100%, 50%);
        }
        .fa-brands.fa-youtube.fa-5x:hover{
            color: hsl(0, 100%, 60%);
        }

        #navbar {
            display: flex;
            align-items: center;
            padding: 5px;
            width: 100%;
            background-color: rgb(83, 80, 80);
            color: hsl(0, 1%, 74%);
            margin:0px
            

        }
        #text-logo {
            display: flex;
            line-height: 1;
            margin-left: -10px;
            margin-top: 15px;
            
            width: 155px;
            
        }
        #text-logo h1{
            margin: 0px;
        }
        #text-logo h6 {
            margin-left: -150px;
        }
        #links {
            display: flex;
            position: relative;
            left: 400px;
            
        }
        #links ul {
            list-style: none;
            display: flex;
            gap: 10px;
            font-size: 20px;
            
        }
        #links li{
            
        }
        
    </style>
</head>
<body>
    <header>
    <div id="icons">
    <a href="https://facebook.com" target="_blank"><i class="fa-brands fa-facebook fa-5x "></i></a>
    <a href="https://twitter.com" target="_blank"><i class="fa-brands fa-twitter fa-5x "></i></a>
    <a href="https://instagram.com" target="_blank"><i class="fa-brands fa-instagram fa-5x "></i></a>
    <a href="https://youtube.com" target="_blank"><i class="fa-brands fa-youtube fa-5x "></i></a>
    </div>
    </header>
    <nav id="navbar">
        <img src="../assets/images/INNSYNCH (120 x 120 px).png" alt="STEMATOUR logo">
        <div id="text-logo">
            <h1>STEMATOUR</h1>
            <h6>Mauban Tours</h6>
        </div>

        <div id="links">
            <ul>
                <li>HOME</li>
                <li>BEACH</li>
                <li>PARKS</li>
                <li>RESTAURANT</li>
                <li>MORE</li>

            </ul>
        </div>
        

    </nav>
    
</body>
</html>
